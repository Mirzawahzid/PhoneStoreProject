apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-deployment
  namespace: phonestore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: phonestore-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80