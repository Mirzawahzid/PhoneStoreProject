apiVersion: batch/v1
kind: Job
metadata:
  name: mssql-init
  namespace: phonestore
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Wait until MSSQL port 1433 is accepting connections
        - name: wait-for-mssql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mssql-service 1433; do
                echo "Waiting for MSSQL..."; sleep 5
              done
              echo "MSSQL is up"
      containers:
        - name: init-db
          image: mcr.microsoft.com/mssql/server:2022-latest
          command:
            - bash
            - -c
            - |
              SQLCMD=/opt/mssql-tools18/bin/sqlcmd

              echo "Waiting extra 15s for SQL Server to fully start..."
              sleep 15

              echo "Creating database..."
              $SQLCMD -S mssql-service,1433 -U sa -P "$SA_PASSWORD" -C -Q "
                IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'PhoneStoreDB')
                  CREATE DATABASE PhoneStoreDB
              "

              echo "Creating tables and seeding..."
              $SQLCMD -S mssql-service,1433 -U sa -P "$SA_PASSWORD" -C -d PhoneStoreDB -Q "
                IF NOT EXISTS (SELECT * FROM sysobjects WHERE name='Products' AND xtype='U')
                BEGIN
                  CREATE TABLE Products (
                    Id       INT IDENTITY(1,1) PRIMARY KEY,
                    Name     NVARCHAR(100) NOT NULL,
                    Brand    NVARCHAR(100) NOT NULL,
                    Price    DECIMAL(10,2) NOT NULL,
                    Stock    INT NOT NULL,
                    ImageUrl NVARCHAR(255)
                  );
                  INSERT INTO Products (Name, Brand, Price, Stock, ImageUrl) VALUES
                    ('iPhone 15',      'Apple',   999.99, 50, 'https://example.com/iphone15.jpg'),
                    ('Galaxy S24',     'Samsung', 899.99, 75, 'https://example.com/s24.jpg'),
                    ('Pixel 8',        'Google',  699.99, 40, 'https://example.com/pixel8.jpg'),
                    ('OnePlus 12',     'OnePlus', 799.99, 30, 'https://example.com/op12.jpg'),
                    ('Xperia 1 V',     'Sony',    1199.99, 20,'https://example.com/xperia.jpg');
                  PRINT 'Schema and seed data created.'
                END
                ELSE
                  PRINT 'Table already exists, skipping.'
              "
              echo "Init complete."
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
