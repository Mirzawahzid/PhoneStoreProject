# ─── Grafana datasource auto-provisioning ────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-service.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        editable: false

---
# ─── Grafana dashboard provisioning (auto-load dashboards from ConfigMap) ─────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: PhoneStore
        folder: PhoneStore
        type: file
        options:
          path: /var/lib/grafana/dashboards

---
# ─── PhoneStore API dashboard ─────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  phonestore.json: |
    {
      "title": "PhoneStore API",
      "uid": "phonestore-api",
      "schemaVersion": 38,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "HTTP Requests / sec",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(http_requests_received_total{app=\"api\"}[1m])) by (code)",
            "legendFormat": "{{code}}"
          }]
        },
        {
          "id": 2,
          "title": "Request Duration p95 (seconds)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{app=\"api\"}[5m])) by (le))",
            "legendFormat": "p95"
          }]
        },
        {
          "id": 3,
          "title": "In-flight Requests",
          "type": "stat",
          "gridPos": { "x": 0, "y": 8, "w": 6, "h": 4 },
          "targets": [{
            "expr": "sum(http_requests_in_progress{app=\"api\"})",
            "legendFormat": "In-flight"
          }]
        },
        {
          "id": 4,
          "title": "Error Rate (5xx / sec)",
          "type": "timeseries",
          "gridPos": { "x": 6, "y": 8, "w": 18, "h": 4 },
          "targets": [{
            "expr": "sum(rate(http_requests_received_total{app=\"api\",code=~\"5..\"}[1m]))",
            "legendFormat": "5xx errors"
          }]
        }
      ]
    }

---
# ─── Grafana Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: phonestore123
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://grafana.phonestore.local"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: grafana-data
          emptyDir: {}

---
# ─── Grafana Service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
